<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>統計總表 ‧ 攻守紀錄</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--line:#d8dee6;--ink:#1f2733;--muted:#6b7785;--brand:#d6532b;--brandd:#b8431f;--soft:#eef2f6;--ok:#16794a;
--A:#2563c9;--B:#16794a;--mk:#dff5e4;--mkb:#7cc894;--flag:#fff5d1;--cf:#ffe0dd;--cfb:#e74c3c;}
*{box-sizing:border-box}body{margin:0;font-family:"PingFang TC","Microsoft JhengHei",Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:15px}
header{background:var(--brand);color:#fff;padding:11px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-size:16px;margin:0}
header a{color:#fff;font-size:13px;background:rgba(255,255,255,.18);padding:5px 12px;border-radius:20px;text-decoration:none}
header a:hover{background:rgba(255,255,255,.32)}
.meta{margin-left:auto;font-size:13px;opacity:.9}
.wrap{max-width:1200px;margin:0 auto;padding:16px}
.bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.btn{background:var(--brand);color:#fff;border:none;border-radius:8px;padding:9px 15px;font-weight:700;cursor:pointer;font-size:14px;text-decoration:none;display:inline-block}
.btn:hover{background:var(--brandd)}
.ghost{background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 13px;cursor:pointer;font-weight:600}
.ghost:hover{background:var(--soft)}
.hint{color:var(--muted);font-size:12.5px}
/* 主要統計總表: 底層, 可左右滑動 */
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:0;overflow:auto;max-height:78vh}
table.summary{border-collapse:collapse;width:100%;min-width:780px;background:var(--card);font-size:13.5px}
.summary th,.summary td{border:1px solid var(--line);padding:6px 8px;text-align:center;white-space:nowrap}
.summary th{background:var(--soft);position:sticky;top:0;cursor:pointer}
.summary th:hover{background:#e3e9f0}
.summary td.name{text-align:left;font-weight:600;color:var(--brandd);cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px}
.summary td.name:hover{background:#fff3ee}
.summary td.name::after{content:" ›";color:var(--muted);font-weight:400}
.summary tbody tr:nth-child(even){background:#fafbfc}
.summary tbody tr.empty{color:#aab3bd}
.summary tbody tr.empty td.name{color:#aab3bd}

/* ── 懸浮抽屜 ───────────────────────────────────── */
#backdrop{position:fixed;inset:0;background:rgba(20,26,33,.42);opacity:0;visibility:hidden;transition:opacity .25s;z-index:40}
#backdrop.show{opacity:1;visibility:visible}
#host{position:fixed;top:0;right:0;height:100vh;display:flex;flex-direction:row;z-index:50;transform:translateX(101%);transition:transform .28s ease;pointer-events:none}
#host.open{transform:translateX(0);pointer-events:auto}
.drawer{height:100vh;background:var(--card);box-shadow:-10px 0 30px rgba(0,0,0,.18);display:flex;flex-direction:column;overflow:hidden}
#d1{width:min(470px,93vw)}
#d2{width:0;transition:width .28s ease}
#host.d2open #d2{width:min(580px,96vw)}
.dhead{flex:none;display:flex;align-items:center;gap:10px;padding:13px 15px;border-bottom:1px solid var(--line);background:var(--soft)}
.dhead h2{font-size:15.5px;margin:0;font-weight:800}
.dhead .sub{font-size:12.5px;color:var(--muted)}
.dhead .sp{margin-left:auto}
.xbtn{background:#fff;border:1px solid var(--line);border-radius:8px;width:34px;height:34px;font-size:17px;cursor:pointer;line-height:1}
.xbtn:hover{background:#f0f3f7}
.backbtn{background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 11px;font-size:13px;font-weight:600;cursor:pointer}
.backbtn:hover{background:#f0f3f7}
.dbody{flex:1;overflow:auto;padding:14px;-webkit-overflow-scrolling:touch}

/* 卡片 */
.gcard{border:1px solid var(--line);border-radius:12px;margin-bottom:13px;overflow:hidden;background:#fff}
.gchead{display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:9px 12px;background:#fbfaf0;border-bottom:1px solid var(--line)}
.gchead .ttl{font-weight:800}
.gchead .score{font-weight:800;font-size:15px}
.gchead .score .a{color:var(--A)}.gchead .score .b{color:var(--B)}
.gbadge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
.gbadge.done{background:var(--mk);border:1px solid var(--mkb);color:var(--ok)}
.gbadge.draft{background:var(--soft);border:1px solid var(--line);color:var(--muted)}
table.msheet{border-collapse:collapse;width:100%;font-size:12px;table-layout:fixed}
.msheet th,.msheet td{border:1px solid var(--line);padding:4px 2px;text-align:center;overflow:hidden;text-overflow:ellipsis}
.msheet td.lab{background:var(--soft);font-weight:700;white-space:nowrap;text-align:right;padding-right:6px;width:62px}
.msheet th.nm{font-size:11px;line-height:1.2;padding:4px 1px}
.msheet th.pa{background:#e7effd;color:var(--A)}.msheet th.pb{background:#e6f6ec;color:var(--B)}
.msheet td.mk{background:var(--mk);font-weight:700}
.msheet .hl{outline:2px solid var(--brand);outline-offset:-2px}
.msheet th.hl{background:#ffe3d8 !important;color:var(--brandd)}
.gmeta{padding:8px 12px;font-size:12px;color:var(--muted);border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:4px 14px}
.gmeta b{color:var(--ink);font-weight:600}
.gnote{padding:7px 12px;font-size:11.5px;background:#fff8ef;color:#8a5a2b;border-top:1px solid #f3d9bf}
.imgbtn{display:block;width:calc(100% - 24px);margin:10px 12px 12px;padding:9px;border:1px solid var(--line);border-radius:9px;background:#fff;cursor:pointer;font-weight:700;font-size:13px;color:var(--brandd)}
.imgbtn:hover{background:#fff3ee;border-color:var(--brand)}
.legend{font-size:11.5px;color:var(--muted);margin:0 0 12px}
.legend .sw{display:inline-block;width:13px;height:13px;border-radius:3px;vertical-align:-2px;margin:0 3px 0 8px}
.emptxt{color:var(--muted);text-align:center;padding:40px 10px}

/* 圖片抽屜 */
.imgwrap{flex:1;overflow:auto;background:#222;display:flex;align-items:flex-start;justify-content:center;padding:10px}
.imgwrap img{max-width:100%;height:auto;border-radius:6px;background:#fff}
.imgfoot{flex:none;padding:9px 14px;border-top:1px solid var(--line);font-size:12.5px}
.imgfoot a{color:var(--brandd)}
@media(max-width:900px){
  #host.d2open #d1{width:0}
  #host.d2open #d2{width:100vw}
}
</style></head><body>
<header><h1>📊 統計總表</h1>
<a href="/">← 回校對</a>
<span class="meta" id="meta"></span></header>
<div class="wrap">
 <div class="bar">
   <a class="btn" href="/api/summary.csv" download="籃球統計總表.csv">⬇️ 匯出 CSV(可用 Excel 開)</a>
   <button class="ghost" onclick="window.print()">🖨 列印 / 存 PDF</button>
   <label class="hint"><input type="checkbox" id="hideEmpty"> 只看有資料的人</label>
   <span class="hint" id="status"></span>
 </div>
 <p class="hint" style="margin:0 0 10px">💡 點任一<b>球員姓名</b>，右側抽屜會列出他所有場次的攻守記錄卡片，可逐張核對、並開啟原始圖檔。表格可左右滑動。</p>
 <div class="card"><table class="summary" id="tbl"></table></div>
 <p class="hint" style="margin-top:10px">總表只統計「已確認」的場次。勝/負依該場兩隊總得分比較;裁判三欄各自計次。得分以總得分為準。<br>抽屜中的卡片含<b>所有</b>場次(草稿與已確認),供逐場校對。</p>
</div>

<!-- 懸浮抽屜 -->
<div id="backdrop" onclick="closeAll()"></div>
<div id="host">
  <div class="drawer" id="d1">
    <div class="dhead">
      <div>
        <h2 id="d1title">球員場次</h2>
        <div class="sub" id="d1sub"></div>
      </div>
      <span class="sp"></span>
      <button class="xbtn" onclick="closeAll()" title="關閉">✕</button>
    </div>
    <div class="dbody" id="d1body"></div>
  </div>
  <div class="drawer" id="d2">
    <div class="dhead">
      <button class="backbtn" onclick="closeImg()">← 返回卡片</button>
      <div>
        <h2 style="font-size:14.5px">原始圖檔</h2>
        <div class="sub" id="d2sub"></div>
      </div>
      <span class="sp"></span>
      <button class="xbtn" onclick="closeAll()" title="關閉全部">✕</button>
    </div>
    <div class="imgwrap"><img id="d2img" alt="原始攻守紀錄表掃描圖"></div>
    <div class="imgfoot" id="d2foot"></div>
  </div>
</div>

<script>
let COLS=[],ROWS=[],sortKey=null,sortDir=1;
let SHEETS=[],BYNAME={};
const NUMERIC=new Set(["序號","完賽場數","勝場次","負場次","總得分","助攻","抄截","防守籃板","進攻籃板","犯規","擔任主裁判","擔任副裁判","擔任紀錄"]);
const SROWS=[["得分","pts"],["犯規","foul"],["團犯","tfoul"],["助攻","ast"],["進攻籃板","oreb"],["防守籃板","dreb"],["抄截","stl"]];
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function isEmptyRow(r){return COLS.every(c=>c==='序號'||c==='姓名'||!r[c]);}

async function load(){
  try{
    const [sum,sh]=await Promise.all([
      fetch('/api/summary').then(r=>r.json()),
      fetch('/api/sheets').then(r=>r.json())
    ]);
    COLS=sum.cols;ROWS=sum.rows;
    SHEETS=sh.sheets||[];
    BYNAME={};
    SHEETS.forEach(s=>{(s.players||[]).forEach(p=>{const n=(p.name||'').trim();if(n){(BYNAME[n]=BYNAME[n]||[]).push(s);}});});
    document.getElementById('status').textContent='共 '+ROWS.length+' 位 ‧ '+SHEETS.length+' 場記錄';
    render();
  }catch(e){document.getElementById('status').textContent='⚠️ 無法連線到本地服務';}
}
function render(){
  const hide=document.getElementById('hideEmpty').checked;
  let rows=ROWS.slice();
  if(sortKey){rows.sort((a,b)=>{let x=a[sortKey],y=b[sortKey];if(NUMERIC.has(sortKey)){x=+x;y=+y;}return x<y?-1*sortDir:x>y?sortDir:0;});}
  if(hide)rows=rows.filter(r=>!isEmptyRow(r));
  let h='<thead><tr>'+COLS.map(c=>`<th onclick="sortBy('${c}')">${c}${sortKey===c?(sortDir>0?' ▲':' ▼'):''}</th>`).join('')+'</tr></thead><tbody>';
  rows.forEach(r=>{
    h+='<tr class="'+(isEmptyRow(r)?'empty':'')+'">'+COLS.map(c=>{
      if(c==='姓名'){const n=esc(r[c]);return `<td class="name" onclick="openPlayer('${n.replace(/'/g,"\\'")}')" title="點我看所有場次">${n}</td>`;}
      return `<td>${esc(r[c])}</td>`;
    }).join('')+'</tr>';
  });
  h+='</tbody>';
  document.getElementById('tbl').innerHTML=h;
}
function sortBy(c){if(sortKey===c)sortDir*=-1;else{sortKey=c;sortDir=1;}render();}

/* ── 卡片渲染 ── */
function cardHTML(s,who){
  const players=s.players||[];
  const score=`<span class="score"><span class="a">${esc(s.totalA)}</span> : <span class="b">${esc(s.totalB)}</span></span>`;
  const noTxt=(s.no===''||s.no==null)?'—':esc(s.no);
  const badge=s.done?'<span class="gbadge done">已確認</span>':'<span class="gbadge draft">草稿</span>';
  // 表頭(姓名)
  let head='<tr><th class="lab" style="background:#eef2f6"></th>';
  players.forEach(p=>{
    const hl=(p.name||'').trim()===who?' hl':'';
    const tc=p.team==='A'?'pa':'pb';
    head+=`<th class="nm ${tc}${hl}">${esc(p.name||'—')}</th>`;
  });
  head+='</tr>';
  // 各統計列
  let body='';
  SROWS.forEach(([lab,k])=>{
    body+=`<tr><td class="lab">${lab}</td>`;
    players.forEach(p=>{
      const cell=(p.stats&&p.stats[k])||{v:'',m:false};
      const hl=(p.name||'').trim()===who?' hl':'';
      const mk=cell.m?' mk':'';
      const v=(cell.v===''||cell.v==null)?'':esc(cell.v);
      body+=`<td class="${mk}${hl}">${v}</td>`;
    });
    body+='</tr>';
  });
  const refs=`主裁 <b>${esc(s.refMain||'—')}</b>‧副裁 <b>${esc(s.refAsst||'—')}</b>‧記錄 <b>${esc(s.refScorer||'—')}</b>`;
  const note=s.note?`<div class="gnote">📝 ${esc(s.note)}</div>`:'';
  const sidJs=s.sid.replace(/'/g,"\\'");
  return `<div class="gcard">
    <div class="gchead"><span class="ttl">場次 ${noTxt}</span><span>場地 ${esc(s.venue||'—')}</span>${score}${badge}</div>
    <table class="msheet">${head}${body}</table>
    <div class="gmeta"><span>${refs}</span></div>
    ${note}
    <button class="imgbtn" onclick="openImg('${sidJs}','${esc('場次 '+noTxt+' ‧ 場地 '+(s.venue||'—')).replace(/'/g,"\\'")}')">🖼 查看原始圖檔</button>
  </div>`;
}

/* ── 抽屜控制 ── */
function openPlayer(name){
  const list=(BYNAME[name]||[]).slice();
  document.getElementById('d1title').textContent=name;
  document.getElementById('d1sub').textContent=list.length?(list.length+' 場記錄 ‧ 由上到下逐場核對'):'查無此球員的場次';
  const legend='<p class="legend">圖例：<span class="sw" style="background:var(--mk);border:1px solid var(--mkb)"></span>綠=紙上有劃記 <span class="sw" style="background:#ffe3d8;border:1px solid var(--brand)"></span>橘框=此球員欄</p>';
  document.getElementById('d1body').innerHTML=list.length
    ? legend+list.map(s=>cardHTML(s,name)).join('')
    : '<div class="emptxt">查無此球員的場次紀錄。</div>';
  document.getElementById('d1body').scrollTop=0;
  closeImg();
  const host=document.getElementById('host');
  host.classList.add('open');
  document.getElementById('backdrop').classList.add('show');
}
function openImg(sid,label){
  document.getElementById('d2img').src='/img/'+encodeURIComponent(sid);
  document.getElementById('d2sub').textContent=label||sid;
  document.getElementById('d2foot').innerHTML=`<a href="/img/${encodeURIComponent(sid)}" target="_blank" rel="noopener">↗ 在新分頁開啟原圖(可放大)</a>`;
  document.getElementById('host').classList.add('d2open');
}
function closeImg(){
  document.getElementById('host').classList.remove('d2open');
  document.getElementById('d2img').removeAttribute('src');
}
function closeAll(){
  document.getElementById('host').classList.remove('open','d2open');
  document.getElementById('backdrop').classList.remove('show');
  document.getElementById('d2img').removeAttribute('src');
}
document.addEventListener('keydown',e=>{
  if(e.key!=='Escape')return;
  if(document.getElementById('host').classList.contains('d2open'))closeImg();
  else closeAll();
});
document.getElementById('hideEmpty').addEventListener('change',render);
load();
</script></body></html>
